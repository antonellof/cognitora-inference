# cgn-agent for llama3-8b · vllm · aggregated · KVBM offload.

[cluster]
name           = "cognitora-llama3-8b-agg-kvbm"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "both"
node_id  = "agent-llama3-8b-kvbm"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind       = "vllm"
url        = "http://127.0.0.1:8001"
# `kvbm` makes cgn-agent inject the DynamoConnector into vLLM, pointing
# at the `kvbm.vllm_integration.connector` Python module.
kv_offload = "kvbm"

[engine.vllm]
binary     = "vllm"
extra_args = [
  "--enable-chunked-prefill",
  "--block-size", "16",
  "--gpu-memory-utilization", "0.85",
  "--port", "8001",
  "--host", "127.0.0.1",
]

[models."meta-llama/Meta-Llama-3.1-8B-Instruct"]
tp            = 1
max_model_len = 8192
