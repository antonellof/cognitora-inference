# cgn-kvcached for llama3-8b · vllm · aggregated · KVBM.
#
# KVBM handles the engine-side tiering. cgn-kvcached stays as the
# cross-cluster KV index for cgn-router scoring; the two compose.

[cluster]
name           = "cognitora-llama3-8b-agg-kvbm"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[kv]
listen            = "127.0.0.1:7090"
uds               = "/tmp/cognitora-kv.sock"
ram_gib           = 8
ssd_dir           = "/tmp/cognitora-kv-ssd"
ssd_gib           = 32
index_dir         = "/tmp/cognitora-kv-index"
transport         = "quic"
quic_listen       = "127.0.0.1:7091"
block_size_tokens = 16
