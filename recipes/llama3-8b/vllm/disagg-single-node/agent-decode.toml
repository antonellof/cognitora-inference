# cgn-agent (decode) for llama3-8b · vllm · disaggregated, single-node.
# Pinned to GPU 1.

[cluster]
name           = "cognitora-llama3-8b-disagg-sn"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7081"
role     = "decode"
node_id  = "agent-llama3-8b-decode"
kv_uds   = "/tmp/cognitora-kv.sock"
gpu_index = 1

[engine]
kind = "vllm"
url  = "http://127.0.0.1:8002"

[engine.vllm]
binary     = "vllm"
extra_args = [
  "--enable-chunked-prefill",
  "--block-size", "16",
  "--gpu-memory-utilization", "0.85",
  "--port", "8002",
  "--host", "127.0.0.1",
  "--kv-transfer-config",
  "{\"kv_connector\":\"NixlConnector\",\"kv_role\":\"kv_consumer\"}",
]

[models."meta-llama/Meta-Llama-3.1-8B-Instruct"]
tp            = 1
max_model_len = 8192
