# cgn-agent for llama3-8b · vllm · aggregated · LMCache offload.

[cluster]
name           = "cognitora-llama3-8b-agg-lmcache"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "both"
node_id  = "agent-llama3-8b-lmcache"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind       = "vllm"
url        = "http://127.0.0.1:8001"
# `lmcache` makes cgn-agent inject:
#   --kv-transfer-config '{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
# into the vLLM argv. See docs/architecture/kv-strategy.md.
kv_offload = "lmcache"

[engine.vllm]
binary     = "vllm"
extra_args = [
  "--enable-chunked-prefill",
  "--block-size", "16",
  "--gpu-memory-utilization", "0.85",
  "--port", "8001",
  "--host", "127.0.0.1",
]

[models."meta-llama/Meta-Llama-3.1-8B-Instruct"]
tp            = 1
max_model_len = 8192
