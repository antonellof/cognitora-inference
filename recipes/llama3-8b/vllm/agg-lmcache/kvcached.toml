# cgn-kvcached for llama3-8b · vllm · aggregated · LMCache.
#
# Even with LMCache handling engine-internal offload, we still run
# cgn-kvcached as the cross-cluster KV-aware routing layer: it indexes
# block residency so cgn-router can score nodes by longest-prefix
# overlap. LMCache + cgn-kvcached compose — they don't compete.

[cluster]
name           = "cognitora-llama3-8b-agg-lmcache"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[kv]
listen            = "127.0.0.1:7090"
uds               = "/tmp/cognitora-kv.sock"
ram_gib           = 8
ssd_dir           = "/tmp/cognitora-kv-ssd"
ssd_gib           = 32
index_dir         = "/tmp/cognitora-kv-index"
transport         = "quic"
quic_listen       = "127.0.0.1:7091"
block_size_tokens = 16
