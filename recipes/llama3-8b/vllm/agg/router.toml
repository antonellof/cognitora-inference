# cgn-router for llama3-8b · vllm · aggregated.

[cluster]
name           = "cognitora-llama3-8b-agg"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[router]
listen_http  = "0.0.0.0:8080"
listen_grpc  = "0.0.0.0:9090"
listen_admin = "127.0.0.1:9091"
node_id      = "router-llama3-8b-agg"

# KV is the dominant signal in the aggregated topology — only one agent
# is serving the model, so prefix-overlap fully determines reuse and
# load is trivially balanced. Power and capacity float as ties.
[router.score_weights]
kv       = 0.55
load     = 0.25
power    = 0.10
capacity = 0.10

[router.admission]
max_queue                  = 4096
ttft_slo                   = "800ms"
max_concurrent_per_replica = 32

[router.rate_limit]
rps   = 200
burst = 800

[router.cascade]
enabled              = false
confidence_threshold = -1.0

[router.disagg]
enabled               = false
colocate_below_tokens = 256

[models."meta-llama/Meta-Llama-3.1-8B-Instruct"]
tp = 1
