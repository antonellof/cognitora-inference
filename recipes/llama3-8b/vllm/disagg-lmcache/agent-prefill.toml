# cgn-agent (prefill) for llama3-8b · vllm · disagg + LMCache offload.
# Pinned to GPU 0.

[cluster]
name           = "cognitora-llama3-8b-disagg-lmcache"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen    = "127.0.0.1:7080"
role      = "prefill"
node_id   = "agent-llama3-8b-prefill-lmcache"
kv_uds    = "/tmp/cognitora-kv.sock"
gpu_index = 0

[engine]
kind       = "vllm"
url        = "http://127.0.0.1:8001"
# `lmcache` + role = "prefill" makes cgn-agent inject a PdConnector that
# stacks LMCache (offload) and NixlConnector (handoff to decode):
#   --kv-transfer-config '{"kv_connector":"PdConnector",...}'
kv_offload = "lmcache"

[engine.vllm]
binary     = "vllm"
extra_args = [
  "--enable-chunked-prefill",
  "--block-size", "16",
  "--gpu-memory-utilization", "0.85",
  "--port", "8001",
  "--host", "127.0.0.1",
]

[models."meta-llama/Meta-Llama-3.1-8B-Instruct"]
tp            = 1
max_model_len = 8192
