[cluster]
name           = "cognitora-qwen3-7b-sglang-agg"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "both"
node_id  = "agent-qwen3-7b-sglang"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind = "sglang"
url  = "http://127.0.0.1:30000"

[engine.sglang]
binary              = "python"
host                = "127.0.0.1"
port                = 30000
context_length      = 8192
mem_fraction_static = 0.85
extra_args = [
  "--enable-radix-cache",
]

[models."Qwen/Qwen3-7B-Instruct"]
tp            = 1
max_model_len = 8192
