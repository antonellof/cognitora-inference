# cgn-agent for llama3-70b · vllm · aggregated, TP=4.

[cluster]
name           = "cognitora-llama3-70b-agg"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "both"
node_id  = "agent-llama3-70b"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind = "vllm"
url  = "http://127.0.0.1:8001"

[engine.vllm]
binary     = "vllm"
extra_args = [
  "--enable-chunked-prefill",
  "--block-size", "128",
  "--gpu-memory-utilization", "0.90",
  "--port", "8001",
  "--host", "127.0.0.1",
]

[models."RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic"]
tp            = 4
max_model_len = 8192
