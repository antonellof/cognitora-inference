# cgn-agent (prefill, TP=4) for llama3-70b · vllm · disaggregated, single-node.
# Pinned to GPUs 0-3 — set CUDA_VISIBLE_DEVICES=0,1,2,3 in the shell that runs up.sh.

[cluster]
name           = "cognitora-llama3-70b-disagg-sn"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "prefill"
node_id  = "agent-llama3-70b-prefill"
kv_uds   = "/tmp/cognitora-kv.sock"
gpu_index = 0

[engine]
kind = "vllm"
url  = "http://127.0.0.1:8001"

[engine.vllm]
binary     = "vllm"
extra_args = [
  "--enable-chunked-prefill",
  "--block-size", "128",
  "--gpu-memory-utilization", "0.90",
  "--port", "8001",
  "--host", "127.0.0.1",
  "--kv-transfer-config",
  "{\"kv_connector\":\"NixlConnector\",\"kv_role\":\"kv_producer\"}",
]

[models."RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic"]
tp            = 4
max_model_len = 8192
