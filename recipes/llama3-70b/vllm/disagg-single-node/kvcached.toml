# cgn-kvcached for llama3-70b · vllm · disaggregated, single-node.

[cluster]
name           = "cognitora-llama3-70b-disagg-sn"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[kv]
listen            = "127.0.0.1:7090"
uds               = "/tmp/cognitora-kv.sock"
ram_gib           = 120
ssd_dir           = "/var/lib/cognitora/kv-ssd"
ssd_gib           = 256
index_dir         = "/var/lib/cognitora/kv-index"
transport         = "quic"
quic_listen       = "0.0.0.0:7091"
block_size_tokens = 128
