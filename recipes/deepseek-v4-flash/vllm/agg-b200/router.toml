# cgn-router for deepseek-v4-flash · vllm · aggregated · 4× B200.
#
# Single replica, decode-only, DP=4 + Expert Parallel. The router still
# does KV-aware scoring across DP shards so repeated prefixes land on
# the warm shard.

[cluster]
name           = "cognitora-dsv4-flash-vllm-agg-b200"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[router]
listen_http  = "0.0.0.0:8080"
listen_grpc  = "0.0.0.0:9090"
listen_admin = "127.0.0.1:9091"
node_id      = "router-dsv4-flash-vllm-agg-b200"

# 284B-total / 13B-active MoE: KV reuse is the dominant signal because
# repeated reasoning traces and tool-call prefixes are common; load and
# capacity matter for choosing between DP shards.
[router.score_weights]
kv       = 0.55
load     = 0.25
power    = 0.10
capacity = 0.10

[router.admission]
max_queue                  = 8192
ttft_slo                   = "5000ms"   # FP4+FP8 MoE on 4× B200 — relaxed TTFT SLO
max_concurrent_per_replica = 256        # matches `--max-num-seqs 256`

[router.rate_limit]
rps   = 200
burst = 800

[models."deepseek-ai/DeepSeek-V4-Flash"]
tp = 1
