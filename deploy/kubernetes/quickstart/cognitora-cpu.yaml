# Cognitora — single-pod CPU quickstart for any Kubernetes cluster.
#
# Brings up the full stack — etcd + llama.cpp engine + cgn-router +
# cgn-agent — in one Pod, fronted by a LoadBalancer Service that gives
# you a public OpenAI-compatible URL on port 80.
#
# Designed to be the cheapest way to validate the full Cognitora data
# plane on a real Kubernetes cluster (GKE Autopilot, EKS Fargate, AKS,
# k3d, kind, Docker Desktop). No GPU required, no Helm, no operator,
# no PKI, no auth. The model — TinyLlama 1.1B Q4 — is downloaded by
# an init container on first boot.
#
# To use:
#
#   kubectl apply -f deploy/kubernetes/quickstart/cognitora-cpu.yaml
#   kubectl -n cognitora wait --for=condition=ready pod -l app=cognitora --timeout=10m
#   IP=$(kubectl -n cognitora get svc cognitora-router \
#          -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
#   curl -sS http://$IP/v1/chat/completions \
#     -H 'Content-Type: application/json' \
#     -d '{"model":"tinyllama","messages":[{"role":"user","content":"hi"}]}'
#
# For production deployments swap the engine container for vLLM /
# SGLang / TRT-LLM, scale the agent into its own DaemonSet, enable
# `[security].require_mtls`, and front the router with an Ingress with
# auth instead of LoadBalancer.

apiVersion: v1
kind: Namespace
metadata:
  name: cognitora
  labels:
    app.kubernetes.io/name: cognitora
    app.kubernetes.io/component: quickstart
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cognitora-config
  namespace: cognitora
data:
  cognitora.toml: |
    # Generated by deploy/kubernetes/quickstart/cognitora-cpu.yaml.
    # All four binaries (etcd, engine, router, agent) live in one Pod
    # and reach each other on localhost.

    [cluster]
    name           = "quickstart"
    state_backend  = "etcd"
    etcd_endpoints = ["http://127.0.0.1:2379"]

    [security]
    require_mtls = false

    [router]
    listen_http  = "0.0.0.0:8080"
    listen_grpc  = "0.0.0.0:9090"
    listen_admin = "0.0.0.0:9091"
    node_id      = "router-0"

    [agent]
    listen  = "127.0.0.1:7070"
    role    = "both"
    node_id = "node-0"

    [engine]
    kind = "openai_compat"
    url  = "http://127.0.0.1:8000"

    [metrics]
    listen          = "0.0.0.0:9092"
    scrape_interval = "10s"
    scrape_targets  = [
      { name = "router", url = "http://127.0.0.1:9091/metrics" },
    ]

    [models.tinyllama]
    hf_repo = "TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF"
    tp      = 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitora
  namespace: cognitora
  labels:
    app: cognitora
spec:
  replicas: 1
  strategy:
    type: Recreate    # one Pod, single etcd; we don't roll
  selector:
    matchLabels:
      app: cognitora
  template:
    metadata:
      labels:
        app: cognitora
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: model-download
          # Pre-pull TinyLlama GGUF into the shared emptyDir before the
          # engine container starts. Keeps llama-server's startup fast
          # and lets us use a vanilla llama.cpp image with no model
          # baked in.
          image: curlimages/curl:8.10.1
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              MODEL=/models/tinyllama.gguf
              if [ -f "$MODEL" ]; then
                echo "model already present at $MODEL; skipping download"
                exit 0
              fi
              echo "downloading TinyLlama 1.1B Q4_K_M (~669 MiB) ..."
              curl --fail --location --retry 5 --retry-all-errors \
                -o "$MODEL.tmp" \
                https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
              mv "$MODEL.tmp" "$MODEL"
              ls -lh "$MODEL"
          volumeMounts:
            - { name: models, mountPath: /models }
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }

      containers:
        # ---- etcd: cluster coordination service ----
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.15
          command:
            - /usr/local/bin/etcd
            - --name=cognitora-etcd
            - --data-dir=/data
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://127.0.0.1:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://127.0.0.1:2380
            - --initial-cluster=cognitora-etcd=http://127.0.0.1:2380
            - --initial-cluster-state=new
          ports:
            - { containerPort: 2379, name: etcd-client }
          readinessProbe:
            exec:
              command: ["/usr/local/bin/etcdctl", "endpoint", "health"]
            periodSeconds: 3
          volumeMounts:
            - { name: etcd-data, mountPath: /data }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }

        # ---- engine: llama.cpp server, OpenAI-compatible HTTP ----
        - name: engine
          image: ghcr.io/ggml-org/llama.cpp:server
          command: ["/app/llama-server"]
          args:
            - "-m"
            - "/models/tinyllama.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "-c"
            - "2048"      # ctx
            - "-t"
            - "2"         # threads — keep low for CPU-only Autopilot pricing
            - "--alias"
            - "tinyllama"
          ports:
            - { containerPort: 8000, name: engine }
          readinessProbe:
            httpGet: { path: /health, port: engine }
            periodSeconds: 5
            failureThreshold: 60   # llama-server warms slowly on CPU
          volumeMounts:
            - { name: models, mountPath: /models, readOnly: true }
          resources:
            requests: { cpu: "1",   memory: "1Gi" }
            limits:   { cpu: "2",   memory: "2Gi" }

        # ---- router: OpenAI HTTP gateway + KV-aware orchestrator ----
        - name: router
          image: ghcr.io/antonellof/cognitora:latest
          command: ["/usr/local/bin/cgn-router"]
          args: ["--config", "/etc/cognitora/cognitora.toml"]
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9090, name: grpc }
            - { containerPort: 9091, name: admin }
          readinessProbe:
            httpGet: { path: /readyz,  port: admin }
            periodSeconds: 5
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: admin }
            periodSeconds: 10
          volumeMounts:
            - { name: config, mountPath: /etc/cognitora }
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }

        # ---- agent: per-node engine supervisor ----
        - name: agent
          image: ghcr.io/antonellof/cognitora:latest
          command: ["/usr/local/bin/cgn-agent"]
          args: ["--config", "/etc/cognitora/cognitora.toml"]
          volumeMounts:
            - { name: config, mountPath: /etc/cognitora }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }

        # ---- metrics: prometheus federation aggregator ----
        - name: metrics
          image: ghcr.io/antonellof/cognitora:latest
          command: ["/usr/local/bin/cgn-metrics"]
          args: ["--config", "/etc/cognitora/cognitora.toml"]
          ports:
            - { containerPort: 9092, name: federate }
          volumeMounts:
            - { name: config, mountPath: /etc/cognitora }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }

      volumes:
        - name: config
          configMap: { name: cognitora-config }
        - name: models
          emptyDir:
            sizeLimit: 2Gi
        - name: etcd-data
          emptyDir:
            sizeLimit: 1Gi
---
# Public OpenAI-compatible endpoint. GKE / EKS / AKS will allocate an
# external IP automatically. On kind / k3d use `kubectl port-forward`.
apiVersion: v1
kind: Service
metadata:
  name: cognitora-router
  namespace: cognitora
  labels:
    app: cognitora
spec:
  type: LoadBalancer
  selector:
    app: cognitora
  ports:
    - { name: http, port: 80, targetPort: 8080 }
---
# Internal Service for /metrics — Prometheus can scrape this directly.
apiVersion: v1
kind: Service
metadata:
  name: cognitora-metrics
  namespace: cognitora
  labels:
    app: cognitora
spec:
  type: ClusterIP
  selector:
    app: cognitora
  ports:
    - { name: router-admin, port: 9091, targetPort: 9091 }
    - { name: federate,     port: 9092, targetPort: 9092 }
