apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inferenceclusters.cognitora.dev
spec:
  group: cognitora.dev
  scope: Namespaced
  names:
    kind: InferenceCluster
    listKind: InferenceClusterList
    plural: inferenceclusters
    singular: inferencecluster
    shortNames: [ic, infcluster]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                clusterName:
                  type: string
                router:
                  type: object
                  properties:
                    replicas: { type: integer, minimum: 1 }
                    serviceType: { type: string, enum: [ClusterIP, NodePort, LoadBalancer] }
                agent:
                  type: object
                  properties:
                    nodeSelector:
                      type: object
                      additionalProperties: { type: string }
                    tolerations:
                      type: array
                      items: { type: object, x-kubernetes-preserve-unknown-fields: true }
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                kvcached:
                  type: object
                  properties:
                    ramGib: { type: integer, minimum: 1 }
                    ssdGib: { type: integer, minimum: 0 }
                metrics:
                  type: object
                  properties:
                    enabled: { type: boolean }
                    scrapeInterval: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                readyReplicas: { type: integer }
                lastReconciled: { type: string, format: date-time }
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Phase,    type: string,  jsonPath: .status.phase }
        - { name: Ready,    type: integer, jsonPath: .status.readyReplicas }
        - { name: Age,      type: date,    jsonPath: .metadata.creationTimestamp }
