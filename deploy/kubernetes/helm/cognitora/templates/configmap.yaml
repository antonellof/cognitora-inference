apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cognitora.fullname" . }}-config
  labels: {{- include "cognitora.labels" . | nindent 4 }}
data:
  cognitora.toml: |
    [cluster]
    name = {{ .Values.cluster.name | quote }}
    data_dir = "/var/lib/cognitora"

    [security]
    require_mtls   = true
    ca_file        = "/etc/cognitora/pki/ca.crt"
    cert_file      = "/etc/cognitora/pki/leaf.crt"
    key_file       = "/etc/cognitora/pki/leaf.key"
    client_ca_file = "/etc/cognitora/pki/ca.crt"

    [auth]
    enabled = {{ .Values.auth.enabled }}

    [router]
    listen_http  = "0.0.0.0:{{ .Values.router.service.httpPort }}"
    listen_grpc  = "0.0.0.0:{{ .Values.router.service.grpcPort }}"
    listen_admin = "127.0.0.1:9091"

    [router.score_weights]
    kv       = {{ .Values.router.scoreWeights.kv }}
    load     = {{ .Values.router.scoreWeights.load }}
    power    = {{ .Values.router.scoreWeights.power }}
    capacity = {{ .Values.router.scoreWeights.capacity }}

    [router.admission]
    max_queue        = {{ .Values.router.admission.maxQueue }}
    ttft_slo_ms      = {{ .Values.router.admission.ttftSloMs }}
    queue_timeout_ms = {{ .Values.router.admission.queueTimeoutMs }}

    [router.rate_limit]
    enabled         = {{ .Values.router.rateLimit.enabled }}
    rps_per_subject = {{ .Values.router.rateLimit.rpsPerSubject }}
    burst           = {{ .Values.router.rateLimit.burst }}

    [router.cascade]
    enabled              = {{ .Values.router.cascade.enabled }}
    confidence_threshold = {{ .Values.router.cascade.confidenceThreshold }}

    [router.disagg]
    enabled               = {{ .Values.router.disagg.enabled }}
    colocate_below_tokens = {{ .Values.router.disagg.colocateBelowTokens }}

    [agent]
    listen_grpc  = "0.0.0.0:7071"
    listen_admin = "127.0.0.1:9091"
    engine       = {{ .Values.agent.engine | quote }}

    [kv]
    listen_grpc = "0.0.0.0:7072"
    listen_quic = "0.0.0.0:7073"
    ram_gib     = {{ .Values.kvcached.ramGib }}
    ssd_gib     = {{ .Values.kvcached.ssdGib }}

    [metrics]
    listen_admin    = "0.0.0.0:9092"
    scrape_interval = {{ .Values.metrics.scrapeInterval | quote }}
