{{- if .Values.metrics.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cognitora.fullname" . }}-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cognitora.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  cognitora.json: |-
{{ .Files.Get "dashboards/cognitora.json" | indent 4 }}
{{- end }}
