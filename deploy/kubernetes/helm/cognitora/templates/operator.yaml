{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cognitora.fullname" . }}-operator
  labels:
    {{- include "cognitora.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cognitora.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "cognitora.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "cognitora.fullname" . }}-operator
      containers:
        - name: cgn-operator
          image: {{ include "cognitora.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            {{- if not .Values.operator.watchAllNamespaces }}
            - --namespace
            - {{ .Release.Namespace }}
            {{- end }}
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: "1",  memory: 512Mi }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cognitora.fullname" . }}-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cognitora.fullname" . }}-operator
rules:
  - apiGroups: ["cognitora.dev"]
    resources: ["inferenceclusters","modelpools","routingpolicies","inferenceclusters/status","modelpools/status","routingpolicies/status"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments","daemonsets","statefulsets"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["services","configmaps","secrets","events","pods"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cognitora.fullname" . }}-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cognitora.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "cognitora.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
{{- end }}
