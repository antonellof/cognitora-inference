[cluster]
name           = "cognitora-bench-gpu"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7184"
role     = "both"
node_id  = "agent-vllm-small"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind = "openai_compat"
url  = "http://127.0.0.1:8101"

[models."cog-qwen-05b-vllm"]
tp = 1
[models."cog-qwen-05b-pair"]
tp = 1
