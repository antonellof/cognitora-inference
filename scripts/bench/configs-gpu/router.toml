[cluster]
name           = "cognitora-bench-gpu"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[router]
listen_http  = "127.0.0.1:8080"
listen_grpc  = "127.0.0.1:7070"
listen_admin = "127.0.0.1:9091"

# Default policy: KV-aware routing dominates.
# We hot-swap this via etcdctl during the F-block (RR vs KV) ablation.
[router.score_weights]
kv       = 0.55
load     = 0.25
power    = 0.10
capacity = 0.10

[router.rate_limit]
enabled = false

# ─── Block A/B: distinct model IDs per (engine, size) ────────────────────────
[models."cog-qwen-05b-ollama"]
tp = 1
[models."cog-qwen-05b-llamacpp"]
tp = 1
[models."cog-qwen-05b-vllm"]
tp = 1
[models."cog-qwen-05b-vllm-nocache"]
tp = 1

[models."cog-qwen-7b-ollama"]
tp = 1
[models."cog-qwen-7b-llamacpp"]
tp = 1
[models."cog-qwen-7b-vllm"]
tp = 1

# ─── Block F: one model name advertised by TWO vLLM-small agents ─────────────
# Routing policy decides which of the two replicas serves any given request.
[models."cog-qwen-05b-pair"]
tp = 1
