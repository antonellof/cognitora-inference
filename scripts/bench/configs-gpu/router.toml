[cluster]
name           = "cognitora-bench-gpu"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[router]
listen_http  = "127.0.0.1:8090"
listen_grpc  = "127.0.0.1:7070"
listen_admin = "127.0.0.1:9091"

[router.score_weights]
kv       = 0.55
load     = 0.25
power    = 0.10
capacity = 0.10

[router.rate_limit]
enabled = false

[models."cog-qwen-05b-vllm"]
tp = 1
[models."cog-qwen-05b-vllm-nocache"]
tp = 1
[models."cog-deepseek-8b-vllm"]
tp = 1

# Block F: same model id, advertised by 2 vLLM-small agents (A on :8101, B on :8104)
[models."cog-qwen-05b-pair"]
tp = 1
