[cluster]
name           = "cognitora-bench"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "both"
node_id  = "agent-ollama"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind = "openai_compat"
url  = "http://127.0.0.1:11434"

[models."qwen2.5:0.5b"]
tp = 1
