[cluster]
name           = "cognitora-bench"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[router]
listen_http  = "127.0.0.1:8080"
listen_grpc  = "127.0.0.1:7070"
listen_admin = "127.0.0.1:9091"

[router.rate_limit]
enabled = false

[models."qwen2.5:0.5b"]
tp            = 1
max_model_len = 2048

[models."Qwen/Qwen2.5-0.5B-Instruct"]
tp            = 1
max_model_len = 2048
