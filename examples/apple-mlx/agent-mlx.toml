# Agent spawns: python3 -m mlx_lm.server --model <hf> --host … --port …
# Apple Silicon + mlx-lm only. engine.url must match http://<host>:<port>.

[cluster]
name           = "cognitora-mlx"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "both"
node_id  = "agent-mlx"
kv_uds   = "/tmp/cognitora-mlx-kv.sock"

[engine]
kind       = "mlx"
url        = "http://127.0.0.1:8090"
kv_offload = "none"

[engine.mlx_lm]
binary = "python3"
host   = "127.0.0.1"
port   = 8090

[models."mlx-community/Meta-Llama-3.2-3B-Instruct-4bit"]
tp = 1
