# Same agent identity (`agent-qwen`) as agent-qwen.toml, but driven by
# vLLM on a GPU host. Drop this in place of agent-qwen.toml without
# touching router.toml — the router routes by `model` claim and doesn't
# care which engine produced the tokens.

[cluster]
name           = "cognitora-multi-llm"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7080"
role     = "both"
node_id  = "agent-qwen"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind = "vllm"
url  = "http://127.0.0.1:8001"

[engine.vllm]
binary     = "vllm"
extra_args = ["--enable-chunked-prefill", "--port", "8001", "--host", "127.0.0.1"]

[models."Qwen/Qwen2.5-0.5B-Instruct"]
tp            = 1
max_model_len = 4096
# vLLM resolves the model name as a HuggingFace repo id; no `path` needed.
