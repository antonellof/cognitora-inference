[cluster]
name           = "cognitora-multi-llm"
state_backend  = "etcd"
etcd_endpoints = ["http://127.0.0.1:2379"]

[security]
require_mtls = false

[auth]
enabled = false

[agent]
listen   = "127.0.0.1:7081"
role     = "both"
node_id  = "agent-tiny"
kv_uds   = "/tmp/cognitora-kv.sock"

[engine]
kind = "llama_cpp"
url  = "http://127.0.0.1:8002"

[engine.llama_cpp]
binary       = "python"
mode         = "python_server"
host         = "127.0.0.1"
port         = 8002
n_ctx        = 2048
n_threads    = 2
n_gpu_layers = 0

[models."TinyLlama/TinyLlama-1.1B-Chat-v1.0"]
tp            = 1
max_model_len = 2048
path          = "~/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
