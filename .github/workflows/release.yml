name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # Build Linux release binaries.
  #
  # Linux-only by design: the deployment surface (bare metal, Kubernetes,
  # bare-VM cloud images) is Linux. Local mac development is supported via
  # `cargo build` from source; we just don't ship prebuilt mac binaries.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev clang lld libprotobuf-dev

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >>"$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        # Build only the binaries we ship. `--no-default-features` mirrors
        # the local dev build and avoids dragging in optional features
        # (redis-backend, k8s controller, etc.) that aren't needed for
        # the standard release.
        run: |
          cargo build --release --no-default-features \
            --target ${{ matrix.target }} \
            -p cgn-router \
            -p cgn-agent \
            -p cgn-kvcached \
            -p cgn-ctl

      - name: Pack archive
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          STAGING="cognitora-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${STAGING}"

          BINS=(cgn-router cgn-agent cgn-kvcached cgn-ctl)
          for b in "${BINS[@]}"; do
            src="target/${{ matrix.target }}/release/${b}"
            if [ -x "$src" ]; then
              cp "$src" "dist/${STAGING}/${b}"
            else
              echo "::warning ::missing binary: $src"
            fi
          done

          # Bundle license + a small README so the tarball is self-contained.
          cp LICENSE "dist/${STAGING}/" 2>/dev/null || true
          cat > "dist/${STAGING}/README.txt" <<EOF
          Cognitora ${TAG} for ${{ matrix.target }}

          Binaries in this archive:
          $(ls "dist/${STAGING}" | grep -E '^cgn-' | sed 's/^/  - /')

          Install via: deploy/installer/install.sh in the repo, or run any
          binary directly. Configuration reference: docs/reference/config.md
          EOF

          ( cd dist && tar -czf "${STAGING}.tar.gz" "${STAGING}" )
          rm -rf "dist/${STAGING}"

          # POSIX `<sum>  <name>` format consumed by install.sh via sha256sum -c.
          ( cd dist && sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256" )

          ls -la dist/

      - name: Cosign keyless sign (optional)
        # Only attempt signing when running in the canonical repo; forks
        # without an OIDC association would fail. Set
        # `vars.RELEASE_COSIGN_SIGN=true` to opt in.
        if: vars.RELEASE_COSIGN_SIGN == 'true'
        uses: sigstore/cosign-installer@v3
        continue-on-error: true

      - name: Sign archive
        if: vars.RELEASE_COSIGN_SIGN == 'true'
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "1"
        shell: bash
        run: |
          STAGING="cognitora-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          cosign sign-blob --yes \
            --output-signature "dist/${STAGING}.tar.gz.sig" \
            "dist/${STAGING}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Aggregate, generate release notes, attach to the tag.
  # ---------------------------------------------------------------------------
  publish:
    name: publish release
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artefacts
        run: |
          mkdir -p dist
          find artifacts -mindepth 1 -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Aggregate checksums
        run: |
          ( cd dist && cat ./*.sha256 | sort > SHA256SUMS )
          cat dist/SHA256SUMS

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >>"$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          fi

      - name: Render release body
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          {
            printf '## Cognitora %s\n\n' "$TAG"
            printf 'OpenAI-compatible inference platform — single command install:\n\n'
            printf '```\n'
            printf 'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/installer/install.sh | sh\n'
            printf '```\n\n'
            printf 'Pin this version: `CGN_VERSION=%s curl -fsSL .../install.sh | sh`\n\n' "$TAG"
            printf '### Artefacts\n\n'
            printf '| Platform | Archive |\n|----------|---------|\n'
            for f in dist/cognitora-*.tar.gz; do
              base=$(basename "$f")
              target=$(printf '%s' "$base" | sed -E "s/^cognitora-${TAG}-//;s/\\.tar\\.gz\$//")
              printf '| `%s` | `%s` |\n' "$target" "$base"
            done
            printf '\n### Checksums (SHA-256)\n\n```\n'
            cat dist/SHA256SUMS
            printf '```\n'
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Stage signatures (if any)
        # Cosign signing is opt-in (vars.RELEASE_COSIGN_SIGN). When it's
        # off there are no .sig files; we have to keep the upload list
        # static, so list signatures separately and only include them if
        # they actually exist.
        id: sigs
        shell: bash
        run: |
          if compgen -G 'dist/cognitora-*.tar.gz.sig' >/dev/null; then
            echo "have_sigs=true" >>"$GITHUB_OUTPUT"
          else
            echo "have_sigs=false" >>"$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Cognitora ${{ steps.tag.outputs.name }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/cognitora-*.tar.gz
            dist/cognitora-*.tar.gz.sha256
            dist/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        if: steps.sigs.outputs.have_sigs == 'true'
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            dist/cognitora-*.tar.gz.sig
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Multi-arch container images for `cgn-router`, `cgn-agent`, `cgn-kvcached`.
  # ---------------------------------------------------------------------------
  docker:
    name: docker (${{ matrix.bin }})
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        bin: [cgn-router, cgn-agent, cgn-kvcached, cgn-ctl]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >>"$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          build-args: BIN=${{ matrix.bin }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.bin }}:${{ steps.tag.outputs.name }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.bin }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
